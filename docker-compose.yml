services:
  postgres:
    image: postgres:16-alpine
    container_name: shatra-postgres
    environment:
      POSTGRES_USER: shatra
      POSTGRES_PASSWORD: shatra
      POSTGRES_DB: shatra
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./docker/postgres-init:/docker-entrypoint-initdb.d:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U shatra -d shatra"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: shatra-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    restart: unless-stopped

  shatra-ai:
    build:
      context: .
      dockerfile: services/shatra-ai/Dockerfile
    image: shatra-ai
    container_name: shatra-ai
    environment:
      SHATRA_AI_WORKERS: ${SHATRA_AI_WORKERS:-4}
      SHATRA_AI_QUEUE_SIZE: ${SHATRA_AI_QUEUE_SIZE:-64}
      SHATRA_AI_GRPC_PORT: 50051
      SHATRA_AI_HTTP_PORT: 8081
      RUST_LOG: ${SHATRA_AI_LOG:-shatra_ai=info}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://127.0.0.1:8081/health"]
      interval: 10s
      timeout: 3s
      retries: 3

  app:
    build:
      context: .
      network: host
      args:
        VITE_SENTRY_DSN: ${VITE_SENTRY_DSN:-}
        VITE_APP_VERSION: ${APP_VERSION:-dev}
    image: shatra-app
    container_name: shatra-app
    ports:
      - "8000:8000"
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_DB: 0
      DATABASE_URL: postgresql+asyncpg://shatra:shatra@postgres:5432/shatra
      CORS_ALLOW_ORIGINS: "*"
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      LOG_FORMAT: ${LOG_FORMAT:-json}
      APP_ENV: ${APP_ENV:-production}
      APP_VERSION: ${APP_VERSION:-dev}
      SENTRY_DSN: ${SENTRY_DSN:-}
      SENTRY_TRACES_SAMPLE_RATE: ${SENTRY_TRACES_SAMPLE_RATE:-0.1}
      AI_ENGINE: ${AI_ENGINE:-python}
      AI_SERVICE_URL: ${AI_SERVICE_URL:-shatra-ai:50051}
      AI_MOVE_TIME_MS: ${AI_MOVE_TIME_MS:-300}
      AI_SEARCH_DEPTH: ${AI_SEARCH_DEPTH:-6}
      AI_GRPC_TIMEOUT_MS: ${AI_GRPC_TIMEOUT_MS:-500}
      AI_SHADOW_VERIFY: ${AI_SHADOW_VERIFY:-false}
    depends_on:
      shatra-ai:
        condition: service_healthy
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:v3.2.1
    container_name: shatra-prometheus
    volumes:
      - ./docker/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"
    depends_on:
      - app
    restart: unless-stopped

  loki:
    image: grafana/loki:3.4.2
    container_name: shatra-loki
    command: -config.file=/etc/loki/local-config.yaml
    volumes:
      - ./docker/loki/loki-config.yml:/etc/loki/local-config.yaml:ro
      - loki-data:/loki
    restart: unless-stopped

  promtail:
    image: grafana/promtail:3.4.2
    container_name: shatra-promtail
    command: -config.file=/etc/promtail/config.yml
    volumes:
      - ./docker/promtail/promtail-config.yml:/etc/promtail/config.yml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
    depends_on:
      - loki
    restart: unless-stopped

  grafana:
    image: grafana/grafana:11.5.2
    container_name: shatra-grafana
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ./docker/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./docker/grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
      - loki
    restart: unless-stopped

volumes:
  postgres-data:
  redis-data:
  loki-data:
