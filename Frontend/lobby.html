<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Алтай шатра</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="create-room-page">
    <div class="lobby-layout">
        <!-- Левая колонка: кнопки -->
        <div class="lobby-left">
            <h1>Шатра</h1>
            <p class="subtitle">Алтайская народная игра</p>
            
            <div class="lobby-buttons">
                <button id="btn-create-game" class="btn-lobby btn-lobby-primary">Создать игру</button>
                <button id="btn-challenge-friend" class="btn-lobby btn-lobby-secondary">Вызов другу</button>
            </div>
            
            <div id="error_container" class="error-container" style="display: none;">
                <p id="error_message"></p>
            </div>
        </div>

        <!-- Правая колонка: зал ожидания -->
        <div class="lobby-right">
            <div class="lobby-right-header">
                <h2>Зал ожидания</h2>
                <button id="btn-refresh-rooms" class="btn-lobby btn-lobby-small">Обновить</button>
            </div>
            <div id="rooms-list" class="rooms-list">
                <p class="rooms-empty">Нет доступных комнат</p>
            </div>
        </div>
    </div>

    <script src="lobby.js"></script>
</body>
</html>
