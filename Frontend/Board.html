<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Алтай шатра — игра</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="game-page">
    <!-- Экран ожидания -->
    <div id="waiting-screen" class="waiting-screen">
        <div class="waiting-content">
            <div class="waiting-spinner"></div>
            <h2 class="waiting-title">Ожидание соперника...</h2>
            <p class="waiting-subtitle">Поделитесь этой ссылкой, чтобы пригласить друга:</p>
            <div class="waiting-link-container">
                <input type="text" id="invite-link" class="waiting-link-input" readonly>
                <button id="btn-copy-link" class="btn-lobby btn-lobby-small">Копировать</button>
            </div>
            <p class="waiting-hint">Как только соперник подключится, игра начнётся автоматически</p>
        </div>
    </div>

    <!-- Экран игры (скрыт изначально) -->
    <div id="game-screen" class="game-screen" style="display: none;">
        <!-- Верхняя панель -->
        <div class="game-header">
            <div class="header-left">
                <div class="game-title">Шатра</div>
                <div class="player-info">
                    <span id="my_color">Вы: —</span>
                </div>
            </div>
            <div class="header-right">
                <div class="turn-indicator" id="who_mover">Ход белых</div>
            </div>
        </div>

        <div class="board" id="board">
            <div class="half-of-blacks">
                <div class="field-of-reserve">
                    <div class="row">
                        <div class="kletka nechetnaya" id="position1"></div>
                        <div class="kletka chetnaya" id="position2"></div>
                        <div class="kletka nechetnaya" id="position3"></div>
                    </div>

                    <div class="row">
                        <div class="kletka chetnaya" id="position4"></div>
                        <div class="kletka nechetnaya" id="position5"></div>
                        <div class="kletka chetnaya" id="position6"></div>
                    </div>

                    <div class="row">
                        <div class="kletka nechetnaya" id="position7"></div>
                        <div class="kletka chetnaya" id="position8"></div>
                        <div class="kletka nechetnaya" id="position9"></div>
                    </div>
                </div>

                <div class="field-of-queen">
                    <div class="kletka chetnaya" id="position10"></div>
                </div>

                <div class="main-field">
                    <div class="row">
                        <div class="kletka nechetnaya" id="position11"></div>
                        <div class="kletka chetnaya" id="position12"></div>
                        <div class="kletka nechetnaya" id="position13"></div>
                        <div class="kletka chetnaya" id="position14"></div>
                        <div class="kletka nechetnaya" id="position15"></div>
                        <div class="kletka chetnaya" id="position16"></div>
                        <div class="kletka nechetnaya" id="position17"></div>
                    </div>

                    <div class="row">
                        <div class="kletka chetnaya" id="position18"></div>
                        <div class="kletka nechetnaya" id="position19"></div>
                        <div class="kletka chetnaya" id="position20"></div>
                        <div class="kletka nechetnaya" id="position21"></div>
                        <div class="kletka chetnaya" id="position22"></div>
                        <div class="kletka nechetnaya" id="position23"></div>
                        <div class="kletka chetnaya" id="position24"></div>
                    </div>

                    <div class="row">
                        <div class="kletka nechetnaya" id="position25"></div>
                        <div class="kletka chetnaya" id="position26"></div>
                        <div class="kletka nechetnaya" id="position27"></div>
                        <div class="kletka chetnaya" id="position28"></div>
                        <div class="kletka nechetnaya" id="position29"></div>
                        <div class="kletka chetnaya" id="position30"></div>
                        <div class="kletka nechetnaya" id="position31"></div>
                    </div>
                </div>
            </div>

            <div class="half-of-whites">
                <div class="main-field">
                    <div class="row">
                        <div class="kletka chetnaya" id="position32"></div>
                        <div class="kletka nechetnaya" id="position33"></div>
                        <div class="kletka chetnaya" id="position34"></div>
                        <div class="kletka nechetnaya" id="position35"></div>
                        <div class="kletka chetnaya" id="position36"></div>
                        <div class="kletka nechetnaya" id="position37"></div>
                        <div class="kletka chetnaya" id="position38"></div>
                    </div>

                    <div class="row">
                        <div class="kletka nechetnaya" id="position39"></div>
                        <div class="kletka chetnaya" id="position40"></div>
                        <div class="kletka nechetnaya" id="position41"></div>
                        <div class="kletka chetnaya" id="position42"></div>
                        <div class="kletka nechetnaya" id="position43"></div>
                        <div class="kletka chetnaya" id="position44"></div>
                        <div class="kletka nechetnaya" id="position45"></div>
                    </div>

                    <div class="row">
                        <div class="kletka chetnaya" id="position46"></div>
                        <div class="kletka nechetnaya" id="position47"></div>
                        <div class="kletka chetnaya" id="position48"></div>
                        <div class="kletka nechetnaya" id="position49"></div>
                        <div class="kletka chetnaya" id="position50"></div>
                        <div class="kletka nechetnaya" id="position51"></div>
                        <div class="kletka chetnaya" id="position52"></div>
                    </div>
                </div>

                <div class="field-of-queen">
                    <div class="kletka chetnaya" id="position53"></div>
                </div>

                <div class="field-of-reserve">
                    <div class="row">
                        <div class="kletka nechetnaya" id="position54"></div>
                        <div class="kletka chetnaya" id="position55"></div>
                        <div class="kletka nechetnaya" id="position56"></div>
                    </div>

                    <div class="row">
                        <div class="kletka chetnaya" id="position57"></div>
                        <div class="kletka nechetnaya" id="position58"></div>
                        <div class="kletka chetnaya" id="position59"></div>
                    </div>

                    <div class="row">
                        <div class="kletka nechetnaya" id="position60"></div>
                        <div class="kletka chetnaya" id="position61"></div>
                        <div class="kletka nechetnaya" id="position62"></div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Сообщения -->
        <div id="message"></div>

        <!-- Кнопка "Передать ход" -->
        <div id="button_pass_the_move"></div>

        <!-- Нижняя панель -->
        <div class="game-info-bottom">
            <span id="room_info"></span>
            <span id="essential_positions"></span>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
