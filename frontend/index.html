<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="theme-color" content="#F0E8D3" />
    <meta name="description" content="Шатра — Алтайская народная настольная игра. Играйте онлайн с друзьями или против ИИ." />
    <meta name="keywords" content="шатра, алтайская игра, настольная игра, онлайн, алтай" />
    <meta property="og:title" content="Шатра — Алтайская народная игра" />
    <meta property="og:description" content="Древняя алтайская настольная игра. Сражайтесь с друзьями или ИИ." />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="/favicon.svg" />
    <title>Шатра — Алтайская народная игра</title>
    <style>
      .splash-screen {
        position: fixed;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #F0E8D3;
        z-index: 9999;
      }
      .splash-screen::before {
        content: '';
        position: absolute;
        inset: 0;
        background:
          radial-gradient(ellipse 80% 60% at 50% 0%, rgba(154, 102, 0, 0.10) 0%, transparent 55%),
          radial-gradient(ellipse 60% 40% at 80% 100%, rgba(16, 110, 104, 0.06) 0%, transparent 50%);
        pointer-events: none;
      }
      .splash-content { text-align: center; position: relative; z-index: 1; }
      .splash-emblem { margin: 0 auto 20px; animation: splash-float 3s ease-in-out infinite; }
      .splash-spinner {
        width: 32px; height: 32px; margin: 0 auto 16px;
        border: 2px solid rgba(154, 102, 0, 0.18);
        border-top-color: #9A6600;
        border-radius: 50%;
        animation: splash-spin 0.7s linear infinite;
      }
      .splash-title {
        font-family: Unbounded, system-ui, sans-serif;
        font-size: 1.25rem;
        font-weight: 600;
        color: #271200;
        letter-spacing: 0.12em;
        opacity: 0.85;
      }
      @keyframes splash-float {
        0%, 100% { transform: translateY(0); }
        50% { transform: translateY(-5px); }
      }
      @keyframes splash-spin { to { transform: rotate(360deg); } }
    </style>
  </head>
  <body>
    <div id="root">
      <div id="splash-screen" class="splash-screen">
        <div class="splash-content">
          <div class="splash-emblem">
            <img src="/favicon.svg" width="56" height="56" alt="" aria-hidden="true" />
          </div>
          <div class="splash-spinner"></div>
          <div class="splash-title">Шатра</div>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
