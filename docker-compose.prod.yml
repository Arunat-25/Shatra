services:
  postgres:
    image: postgres:16-alpine
    container_name: shatra-postgres
    environment:
      POSTGRES_USER: shatra
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: shatra
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./docker/postgres-init:/docker-entrypoint-initdb.d:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U shatra -d shatra"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: shatra-redis
    volumes:
      - redis-data:/data
    restart: unless-stopped

  app:
    build:
      context: .
      network: host
      args:
        VITE_SENTRY_DSN: ${VITE_SENTRY_DSN:-}
        VITE_APP_VERSION: ${APP_VERSION:-dev}
    image: shatra-app
    container_name: shatra-app
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_DB: 0
      DATABASE_URL: postgresql+asyncpg://shatra:${POSTGRES_PASSWORD}@postgres:5432/shatra
      CORS_ALLOW_ORIGINS: ${CORS_ALLOW_ORIGINS:-*}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      METRICS_TOKEN: ${METRICS_TOKEN:-}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      LOG_FORMAT: ${LOG_FORMAT:-json}
      APP_ENV: production
      APP_VERSION: ${APP_VERSION:-dev}
      SENTRY_DSN: ${SENTRY_DSN:-}
      SENTRY_TRACES_SAMPLE_RATE: ${SENTRY_TRACES_SAMPLE_RATE:-0.1}
      ADMIN_USER_IDS: ${ADMIN_USER_IDS:-}
    volumes:
      - shatra-static:/shatra-static
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    restart: unless-stopped

  nginx:
    image: nginx:1.27-alpine
    container_name: shatra-nginx
    ports:
      - "80:80"
      - "443:443"
    environment:
      DOMAIN: ${DOMAIN:?DOMAIN is required}
    volumes:
      - ./docker/nginx/templates:/etc/nginx/templates:ro
      - ./docker/nginx/snippets:/etc/nginx/snippets:ro
      - ./docker/nginx/entrypoint.sh:/docker-entrypoint.d/40-shatra-entrypoint.sh:ro
      - shatra-static:/var/www/shatra:ro
      - certbot-www:/var/www/certbot:ro
      - certbot-certs:/etc/letsencrypt:ro
    depends_on:
      - app
    restart: unless-stopped

  certbot:
    image: certbot/certbot:v3.2.0
    container_name: shatra-certbot
    volumes:
      - certbot-www:/var/www/certbot
      - certbot-certs:/etc/letsencrypt
    entrypoint: /bin/sh -c
    command: >
      "trap exit TERM;
       while :; do
         certbot renew --webroot -w /var/www/certbot --quiet;
         sleep 12h & wait $${!};
       done"
    depends_on:
      - nginx
    restart: unless-stopped

  prometheus:
    profiles: [monitoring]
    image: prom/prometheus:v3.2.1
    container_name: shatra-prometheus
    environment:
      METRICS_TOKEN: ${METRICS_TOKEN:?METRICS_TOKEN is required for monitoring profile}
    volumes:
      - ./docker/prometheus/prometheus.prod.yml:/etc/prometheus/prometheus.yml:ro
      - ./docker/prometheus/alerts.yml:/etc/prometheus/alerts.yml:ro
    entrypoint:
      - /bin/sh
      - -c
      - |
        printf '%s' "$$METRICS_TOKEN" > /etc/prometheus/metrics_token
        exec /bin/prometheus \
          --config.file=/etc/prometheus/prometheus.yml \
          --storage.tsdb.path=/prometheus
    depends_on:
      - app
    restart: unless-stopped

  loki:
    profiles: [monitoring]
    image: grafana/loki:3.4.2
    container_name: shatra-loki
    command: -config.file=/etc/loki/local-config.yaml
    volumes:
      - ./docker/loki/loki-config.yml:/etc/loki/local-config.yaml:ro
      - loki-data:/loki
    restart: unless-stopped

  promtail:
    profiles: [monitoring]
    image: grafana/promtail:3.4.2
    container_name: shatra-promtail
    command: -config.file=/etc/promtail/config.yml
    volumes:
      - ./docker/promtail/promtail-config.yml:/etc/promtail/config.yml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
    depends_on:
      - loki
    restart: unless-stopped

  grafana:
    profiles: [monitoring]
    image: grafana/grafana:11.5.2
    container_name: shatra-grafana
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:?GRAFANA_ADMIN_PASSWORD is required for monitoring profile}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ./docker/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./docker/grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports:
      - "127.0.0.1:3000:3000"
    depends_on:
      - prometheus
      - loki
    restart: unless-stopped

volumes:
  postgres-data:
  redis-data:
  loki-data:
  shatra-static:
  certbot-www:
  certbot-certs:
